<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SGBM{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f8f7f4;
      --surface:  #ffffff;
      --border:   #e4e2da;
      --text:     #1a1a18;
      --muted:    #6b6a64;
      --blue:     #1a5fa8;
      --blue-bg:  #e8f0fa;
      --green:    #2a6e3f;
      --green-bg: #e6f4eb;
      --amber:    #7a4f00;
      --amber-bg: #fef3db;
      --red:      #8b1a1a;
      --red-bg:   #fdeaea;
      --gray:     #5a5a56;
      --gray-bg:  #f0ede8;
      --radius:   8px;
      --radius-lg:12px;
    }

    body { font-family: system-ui, sans-serif; background: var(--bg);
           color: var(--text); font-size: 14px; line-height: 1.6; }

    /* Nav */
    nav { background: var(--surface); border-bottom: 1px solid var(--border);
          padding: 0 1.5rem; display: flex; align-items: center;
          gap: 2rem; height: 52px; }
    nav .brand { font-weight: 600; font-size: 15px; color: var(--text);
                 text-decoration: none; }
    nav a { color: var(--muted); text-decoration: none; font-size: 13px; }
    nav a:hover { color: var(--text); }
    nav .nav-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }

    /* Layout */
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .page-header { margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 20px; font-weight: 600; }
    .page-header p  { color: var(--muted); font-size: 13px; margin-top: 2px; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 1.25rem; }
    .card-title { font-size: 13px; font-weight: 600; margin-bottom: 1rem;
                  color: var(--muted); text-transform: uppercase;
                  letter-spacing: .04em; }

    /* Métricas */
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
               margin-bottom: 1.5rem; }
    .metric { background: var(--surface); border: 1px solid var(--border);
              border-radius: var(--radius); padding: 1rem; }
    .metric-val { font-size: 26px; font-weight: 600; }
    .metric-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Tabla */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; font-weight: 500; color: var(--muted);
         border-bottom: 1px solid var(--border); padding: 8px 12px;
         font-size: 12px; }
    td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }

    /* Badges de estado */
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px;
             font-size: 11px; font-weight: 500; }
    .badge-COMPLETADO  { background: var(--green-bg); color: var(--green); }
    .badge-EN_PROCESO  { background: var(--amber-bg); color: var(--amber); }
    .badge-FALLIDO     { background: var(--red-bg);   color: var(--red); }
    .badge-PENDIENTE   { background: var(--gray-bg);  color: var(--gray); }

    /* Botones */
    .btn { display: inline-flex; align-items: center; gap: 6px;
           padding: 7px 16px; border-radius: var(--radius); font-size: 13px;
           font-weight: 500; cursor: pointer; border: 1px solid transparent;
           text-decoration: none; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-outline { background: transparent; border-color: var(--border);
                   color: var(--text); }
    .btn-danger  { background: var(--red-bg); color: var(--red);
                   border-color: #f5c0c0; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* Formularios */
    input, select { padding: 7px 10px; border: 1px solid var(--border);
                    border-radius: var(--radius); font-size: 13px;
                    background: var(--surface); color: var(--text);
                    outline: none; }
    input:focus, select:focus { border-color: var(--blue); }

    /* Alerts */
    .alert { padding: 10px 14px; border-radius: var(--radius);
             font-size: 13px; margin-bottom: 1rem; }
    .alert-success { background: var(--green-bg); color: var(--green); }
    .alert-error   { background: var(--red-bg);   color: var(--red); }
    .alert-warning { background: var(--amber-bg); color: var(--amber); }

    /* Utilidades */
    .mono  { font-family: monospace; font-size: 12px; }
    .muted { color: var(--muted); }
    .flex  { display: flex; align-items: center; }
    .gap-1 { gap: .5rem; }
    .gap-2 { gap: 1rem; }
    .mt-1  { margin-top: .5rem; }
    .mt-2  { margin-top: 1rem; }
  </style>
</head>
<body>

<nav>
  <a href="{% url 'backups:dashboard' %}" class="brand">SGBM</a>
  <a href="{% url 'backups:dashboard' %}">Dashboard</a>
  <a href="{% url 'backups:lista' %}">Backups</a>
  <a href="{% url 'backups:buscar' %}">Buscar curso</a>
  <a href="{% url 'backups:iniciar' %}">Nuevo backup</a>
  <div class="nav-right">
    <span class="muted" style="font-size:12px;">{{ request.user.username }}</span>
    <a href="{% url 'admin:index' %}" class="btn btn-outline btn-sm">Admin</a>
  </div>
</nav>

<div class="container">
  {% for msg in messages %}
    <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
  {% endfor %}

  {% block content %}{% endblock %}
</div>

{% block scripts %}{% endblock %}
</body>
</html>
